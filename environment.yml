name: pi3k_pipeline
channels:
  - conda-forge
  - pytorch
  - pyg
  - bioconda
dependencies:
  - python=3.11
  - pip

  # Core scientific
  - numpy=1.26.4
  - scipy=1.14.0
  - pandas=2.2.2
  - scikit-learn=1.5.1
  - matplotlib=3.9.0
  - seaborn=0.13.2

  # Cheminformatics
  - rdkit=2024.09.3
  - openbabel=3.1.1

  # Deep learning with CUDA
  - pytorch=2.3.1
  - pytorch-cuda=12.1
  - pyg=2.5.3

  # Structural biology / docking
  - pdbfixer=1.11
  - autodock-vina=1.2.3
  - acpype=2023.10.27
  - parmed=4.2.2

  # Notebook
  - jupyter=1.0.0
  - jupyterlab=4.2.2
  - tqdm=4.66.4
  - pyyaml=6.0.1
  - rich=13.7.1

  # GROMACS via conda-forge (optional — system install usually preferred)
  # - gromacs=2026.0

  - pip:
    - pubchempy==1.0.4
    - chembl_webresource_client==0.10
    - admet-ai==1.3.0
    - meeko==0.7.1
    - vina==1.2.3
    - svgwrite==1.4.3
